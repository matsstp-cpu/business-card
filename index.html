<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasia | LocalTrans & Custom.MT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1; /* Инновационный индиго */
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --demo-btn: #f59e0b; /* Оранжевый для демо, чтобы выделиться */
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Живой фон с градиентами */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
        }

        .card {
            width: 85%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 48px 30px; /* Немного больше отступы */
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-img {
            width: 120px; /* Чуть увеличим для фото */
            height: 120px;
            border-radius: 50%;
            padding: 5px;
            background: var(--accent-gradient);
            margin-bottom: 28px;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
        }

        h1 { 
            margin: 0; 
            font-size: 30px; /* Крупнее имя */
            font-weight: 600; 
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #b7c1cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            color: var(--accent); 
            font-size: 14px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px; 
            margin-bottom: 24px; 
        }

        .tagline {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 36px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .links { display: flex; flex-direction: column; gap: 16px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            border: 1px solid transparent;
        }

        /* Кнопка Демо - приоритет №1 */
        .btn-demo {
            background: var(--demo-btn);
            color: #000;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
        }

        /* Главная кнопка контакта — Telegram */
        .btn-tg {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        /* Ссылки на сайты */
        .btn-site {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn:hover { 
            transform: scale(1.03) translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active { transform: scale(0.98) translateY(1px); }

        .footer-logo {
            margin-top: 40px;
            opacity: 0.3;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="avatar.jpeg" alt="Anastasia" class="profile-img">
    
    <h1>Анастасия</h1>
    <div class="subtitle">LocalTrans & Custom.MT</div>

    <div class="tagline">
        Внедряю IT-решения и автоматизацию в процессы перевода. Делаю локализацию технологичной.
    </div>

    <div class="links">
        <a href="https://forms.gle/gkPQvtXqxafHLVLP9" target="_blank" class="btn btn-demo">Запросить демо</a>
        
        <a href="https://t.me/@anastasia_mats" class="btn btn-tg">Написать в Telegram</a>
        
        <a href="https://localtrans.ru" target="_blank" class="btn btn-site">Сайт LocalTrans</a>
        <a href="https://custom.mt" target="_blank" class="btn btn-site">Сайт Custom.MT</a>
    </div>

    <div class="footer-logo">Innovation in Localization</div>
</div>

</body>
</html>
