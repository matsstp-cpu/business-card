<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasia | Tech & Localization</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --accent: #8b5cf6; /* Единый стильный акцент (кибер-фиолетовый) */
            --accent-glow: rgba(139, 92, 246, 0.3);
            --glass: rgba(20, 20, 25, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15), transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.05), transparent 50%);
        }

        .container {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px 30px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes floatUp { to { opacity: 1; transform: translateY(0); } }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 24px;
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--accent);
            z-index: -1;
            filter: blur(15px);
            opacity: 0.5;
            animation: pulse 4s ease-in-out infinite alternate;
        }

        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 0.6; transform: scale(1.05); } }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            background-color: #1a1a2e;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .companies {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
            margin-bottom: 24px;
        }

        .tagline {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .tagline span { color: #fff; font-weight: 400; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 400;
            font-size: 15px;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        /* Выделяем главные кнопки тонким акцентным свечением */
        .btn-primary {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.4);
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-primary:hover {
            background: rgba(139, 92, 246, 0.15);
        }

        .btn:active { transform: scale(0.98); }

        .footer {
            margin-top: 40px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: #52525b;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        
        <div class="avatar-container">
            <img src="https://i.postimg.cc/pXVV1j4v/avatar.jpg" alt="Anastasia" class="profile-img">
        </div>
        
        <h1>Anastasia</h1>
        <div class="companies">LocalTrans × Custom.MT</div>

        <div class="tagline">
            Архитектура локализации. <span>Внедряю AI и автоматизацию</span> в языковые процессы бизнеса.
        </div>

        <div class="links">
            <a href="data:text/vcard;charset=utf-8,BEGIN:VCARD%0AVERSION:3.0%0AFN:Анастасия%0AORG:LocalTrans%20%26%20Custom.MT%0ATEL:+79613068326%0AURL:https://localtrans.ru%0AEND:VCARD" download="Anastasia_Contact.vcf" class="btn btn-primary">Сохранить контакт</a>
            
            <a href="https://forms.gle/SQgoWuJePEfVDHbR9" target="_blank" class="btn btn-primary">Запросить демо</a>
            <a href="https://t.me/anastasia_mats" class="btn">Написать в Telegram</a>
            <a href="https://localtrans.ru" target="_blank" class="btn">LocalTrans.ru</a>
            <a href="https://custom.mt" target="_blank" class="btn">Custom.MT</a>
        </div>

        <div class="footer">Language Engineering</div>
    </div>
</div>

</body>
</html>
